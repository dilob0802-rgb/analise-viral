name: Daily Viral Trends Report

on:
  schedule:
    # Roda diariamente às 12:00 UTC (09:00 Horário de Brasília)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite rodar o script manualmente a qualquer momento pelo GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    # Dá permissão para commitar as alterações de dados de volta no repositório
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Agent
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
        # Se você futuramente adicionar a chave do Gemini no GitHub Secrets
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python agent.py

    - name: Commit and Push Updated Reports Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add web/reports.json
        # Só faz o commit se houver alguma alteração no arquivo para não falhar o build
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update daily reports JSON data [skip ci]"
        git push
